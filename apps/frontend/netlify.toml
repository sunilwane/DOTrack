[build]
base = "apps/frontend"
command = "pnpm install --frozen-lockfile && pnpm build"
publish = "dist"

[build.environment]
NODE_VERSION = "20"

[[redirects]]
from = "/api/*"
to = "https://backend-production-0dbd.up.railway.app/api/:splat"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
